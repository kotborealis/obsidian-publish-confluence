name: build

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install tools and dependencies
        run: python -m pip install --upgrade build setuptools-scm && python -m pip install -e .[dev]

      - name: Run ruff lint
        run: ruff check .

      - name: Run ruff format check
        run: ruff format --check .

      - name: Run ty
        run: ty check --python "$(python -c 'import sys; print(sys.prefix)')"

      - name: Run tests
        run: PYTHONPATH=src python -m unittest discover -s tests

      - name: Build package
        run: python -m build

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/
